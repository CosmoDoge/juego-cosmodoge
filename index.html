<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>CosmoDoge 🚀 | Edición Definitiva Mejorada</title>
  <!-- Fuentes y Librerías -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.41.0/lib/index.iife.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <style>
    /* ========== ESTILOS (Optimizados y Responsivos) ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Orbitron', monospace; overflow: hidden; background: #000; width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; object-fit: cover; background: #000; }
    
    .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #0a0a2a, #000000); transition: all 0.3s ease; }
    .screen.hidden { display: none; }
    #loadingScreen { z-index: 1000; background: #000; }
    #mainMenu { background-image: url('fondo-cosmodoge-inicio.png'); background-size: cover; background-position: center; }
    .loading-container { text-align: center; color: #0ff; }
    .loading-bar { width: 80%; max-width: 300px; height: 20px; background: #333; border-radius: 10px; margin: 20px auto; overflow: hidden; }
    .loading-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #0ff, #f0f); transition: width 0.1s; }
    
    .menu-container { text-align: center; max-width: 480px; width: 90%; padding: 25px 20px; background: linear-gradient(135deg, rgba(0, 20, 50, 0.98), rgba(0, 5, 20, 0.98)); border-radius: 50px; border: 2px solid #0ff; box-shadow: 0 0 50px rgba(0, 255, 255, 0.4); backdrop-filter: blur(5px); max-height: 90vh; overflow-y: auto; }
    .logo { width: 100px; height: 100px; margin: 0 auto 15px; background: url('cosmodoge-cohete-juego.png') center/contain no-repeat; animation: floatLogo 3s ease-in-out infinite; filter: drop-shadow(0 0 10px #0ff); }
    @keyframes floatLogo { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .game-title { font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, #0ff, #f0f, #ff0); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 5px; }
    .menu-buttons { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
    .menu-btn { background: linear-gradient(135deg, #0ff, #0aa); border: none; padding: 12px 20px; border-radius: 50px; font-size: 0.9rem; font-weight: bold; font-family: 'Orbitron', monospace; cursor: pointer; transition: all 0.2s; color: #000; }
    .menu-btn.secondary { background: linear-gradient(135deg, #2a2a4a, #0a0a2a); color: #0ff; border: 1px solid #0ff; }
    .lang-selector { position: absolute; top: 15px; right: 15px; z-index: 200; display: flex; gap: 8px; }
    .lang-btn { background: rgba(0, 255, 255, 0.2); border: 1px solid #0ff; color: #0ff; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 11px; }
    .lang-btn.active { background: #0ff; color: #000; box-shadow: 0 0 10px #0ff; }
    .register-section { margin-top: 15px; padding: 12px; background: rgba(0, 255, 255, 0.1); border-radius: 25px; }
    .register-section input { width: 100%; padding: 10px; border-radius: 30px; border: 1px solid #0ff; background: #111; color: #0ff; font-family: 'Orbitron', monospace; text-align: center; margin-bottom: 8px; font-size: 12px; }
    
    /* HUD */
    .hud-container { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; z-index: 60; pointer-events: none; max-width: 95%; }
    .hud-item { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); border-radius: 30px; padding: 4px 10px; font-family: 'Orbitron', monospace; font-size: 10px; font-weight: bold; border: 1px solid rgba(0, 255, 255, 0.3); white-space: nowrap; pointer-events: none; }
    @media (min-width: 768px) { .hud-item { font-size: 12px; padding: 5px 14px; } .hud-container { gap: 10px; } }
    .hud-score { color: #ffaa44; border-color: #ffaa44; }
    .hud-coins { color: #ffd700; border-color: #ffd700; }
    .hud-cdoge { color: #00ffff; border-color: #00ffff; }
    .hud-bcosmo { color: #ffa500; border-color: #ffa500; }
    
    /* Controles */
    .shoot-btn-mobile { position: fixed; bottom: 20px; right: 20px; width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff4444, #cc0000); border: 3px solid #ff8888; font-size: 1.5rem; font-weight: bold; color: white; cursor: pointer; box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); z-index: 150; display: none; align-items: center; justify-content: center; touch-action: manipulation; }
    
    /* Jefe */
    .boss-health-container { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); width: 400px; z-index: 70; display: none; }
    .boss-health-bar { width: 100%; height: 30px; background: #1a0a0a; border-radius: 15px; border: 2px solid #ff0000; overflow: hidden; }
    .boss-health-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff6600, #ffcc00); transition: width 0.3s; }
    
    /* Utilidades */
    .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #0ff, #0aa); color: #000; padding: 8px 20px; border-radius: 40px; font-weight: bold; z-index: 300; animation: toastFade 2s ease forwards; font-size: 12px; white-space: nowrap; }
    @keyframes toastFade { 0%{opacity:0;transform:translateX(-50%) translateY(20px)}15%{opacity:1}85%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-20px)}}
    .camera-shake { animation: shake 0.3s ease-in-out; }
    @keyframes shake { 25%{transform:translate(-5px,5px)}50%{transform:translate(5px,-5px)}75%{transform:translate(-3px,3px)}}
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="flashScreen" class="flash-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:red;opacity:0;pointer-events:none;z-index:500;transition:opacity 0.1s;"></div>

  <!-- Pantallas -->
  <div id="loadingScreen" class="screen"><div class="loading-container"><div class="logo"></div><h2 style="color:#0ff;">CARGANDO COSMODOGE</h2><div class="loading-bar"><div id="loadingProgress" class="loading-progress"></div></div><p id="loadingText" style="color:#0ff; margin-top:10px;">Iniciando...</p></div></div>
  
  <div id="mainMenu" class="screen">
    <div class="menu-container">
      <div class="logo"></div><h1 class="game-title">COSMODOGE</h1><p style="color:#0ff; font-size:10px; margin-bottom:10px;">🚀 TOCA PARA VOLAR | ESQUIVA Y RECOLECTA 🌟</p>
      <div class="menu-buttons">
        <button id="playBtn" class="menu-btn">🎮 JUGAR</button>
        <button id="shopBtn" class="menu-btn secondary">🛒 TIENDA</button>
        <button id="rewardsBtn" class="menu-btn secondary">🎁 RECOMPENSAS</button>
        <button id="rankingBtn" class="menu-btn secondary">🏆 RANKING</button>
        <button id="statsBtn" class="menu-btn secondary">📊 ESTADÍSTICAS</button>
        <button id="walletBtn" class="menu-btn secondary">🔗 CONECTAR WALLET</button>

      </div>
      <div class="register-section">
        <input type="text" id="registerName" placeholder="✨ NOMBRE GALÁCTICO" maxlength="20">
        <button id="registerBtn" class="menu-btn" style="padding:8px; font-size:0.8rem;">📝 REGISTRARSE</button>
        <div id="userGreeting" class="user-greeting" style="display:none;"></div>
      </div>

  </div>

  <!-- Tienda (Simplificada visualmente pero funcional) -->
  <div id="shopPanel" class="floating-panel" style="display:none;">
    <h2 style="color:#0ff; text-align:center;">🛒 TIENDA</h2>
    <div class="shop-item"><div><strong>🧲 IMÁN (1h)</strong></div><button id="buyMagnet">1,000 🪙</button></div>
    <div class="shop-item"><div><strong>🛡️ ESCUDO (+3)</strong></div><button id="buyShield">1,500 🪙</button></div>
    <div class="shop-item"><div><strong>🔫 PISTOLA</strong></div><button id="buyGun">2,000 🪙</button></div>
    <button id="closeShopBtn" class="menu-btn" style="margin-top:15px; background:#333;">✖️ CERRAR</button>
  </div>

  <!-- HUD -->
  <div class="hud-container">
    <div class="hud-item hud-score" id="scoreDisplay">🚀 0</div>
    <div class="hud-item hud-coins" id="coinDisplay">💰 0</div>
    <div class="hud-item" id="highScoreDisplay">🏆 0</div>
    <div class="hud-item hud-cdoge" id="contadorCDOGE">💎 0</div>
    <div class="hud-item hud-bcosmo" id="contadorBCOSMO">🐕 0</div>
    <div class="hud-item" id="shieldDisplay" style="display:none;">🛡️ 0</div>
    <div class="hud-item" id="imanContador" style="display:none;">🧲 0min</div>
    <div class="hud-item" id="comboDisplay" style="display:none;">🔥 x0</div>
    <div class="hud-item" id="waveDisplay" style="display:none;">🌊 1</div>
    <div class="hud-item" id="multiplierDisplay" style="display:none;">✨ x1</div>
  </div>

  <!-- Jefe UI -->
  <div class="boss-health-container" id="bossHealthContainer">
    <div class="boss-name" id="bossName" style="position:absolute;top:-25px;left:50%;transform:translateX(-50%);color:#f00;font-size:18px;font-weight:bold;text-shadow:0 0 15px #f00;">👾 COSMODRAGON</div>
    <div class="boss-health-bar"><div class="boss-health-fill" id="bossHealthFill"></div></div>
    <div class="boss-health-text" id="bossHealthText" style="text-align:center;color:#fff;margin-top:5px;">❤️ 1000/1000</div>
  </div>

  <button id="shootBtn" class="shoot-btn-mobile">🔫</button>
  <button id="menuFloatBtn" class="menu-float-btn" style="position:fixed;top:20px;right:20px;width:45px;height:45px;background:#000000aa;border:1px solid #0ff;color:#0ff;border-radius:50%;z-index:150;display:none;align-items:center;justify-content:center;">🏠</button>
  <button id="pauseBtn" class="menu-float-btn" style="top:80px;display:none;">⏸️</button>

  <div id="gameOverScreen" class="screen hidden"><div class="gameover-container"><div class="gameover-doge"></div><h1 class="gameover-title">💀 GAME OVER 💀</h1><div class="score-stats"><div class="stat-row"><span>🚀 PUNTAJE</span><span id="finalScoreValue">0</span></div><div class="stat-row"><span>💰 MONEDAS</span><span id="finalCoinsValue">0</span></div><div class="stat-row"><span>💎 CDOGE</span><span id="finalCDOGEValue">0</span></div><div class="stat-row"><span>🐕 BCOSMO</span><span id="finalBCOSMOValue">0</span></div></div><div class="gameover-buttons"><button id="restartBtn" class="gameover-btn">🔄 JUGAR DE NUEVO</button><button id="menuFromGameOver" class="gameover-btn secondary">🏠 MENÚ</button></div></div></div>
  <div id="newRecordScreen" class="screen hidden"><div class="menu-container"><h1 style="color:#ffaa44;">🌟 NUEVO RÉCORD!</h1><div id="recordScore"></div><button id="continueAfterRecord" class="menu-btn">🔄 CONTINUAR</button><button id="menuAfterRecord" class="menu-btn secondary">🏠 MENÚ</button></div></div>

  <script>
    (function() {
      "use strict";
      
      // ==================== CONFIGURACIÓN INICIAL ====================
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      
      // Firebase (Configuración ACTUALIZADA)
      const firebaseConfig = { apiKey: "AIzaSyBTjGJn6S8bz6PSaMUT8YuYKEfMJB_xZW8", authDomain: "cosmodogegame.firebaseapp.com", projectId: "cosmodogegame", storageBucket: "cosmodogegame.firebasestorage.app", messagingSenderId: "269767748803", appId: "1:269767748803:web:e5cfa79835bb2c68024676", measurementId: "G-ZMQ0NV69PH" };
      let db = null;
      try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); } catch(e) { console.warn("Firebase error"); }
      
      // Recursos
      const images = {};
      const sounds = {};
      let audioUnlocked = false;
      
      // Precarga simple
      function preloadAssets() {
        return new Promise((resolve) => {
          const imgList = ['doge', 'fondo2', 'coin', 'cdoge', 'bcosmo', 'cofre', 'obstaculo1', 'boss'];
          let loaded = 0;
          imgList.forEach(key => { const img = new Image(); img.onload = img.onerror = () => { loaded++; document.getElementById('loadingProgress').style.width = `${(loaded/imgList.length)*100}%`; if(loaded === imgList.length) resolve(); }; img.src = `${key}.png`; images[key] = img; });
          setTimeout(resolve, 3000);
        });
      }
      
      function initSounds() {
        try {
          sounds.normal = new Audio('music-cosmodoge-theme.mp3'); sounds.normal.loop = true; sounds.normal.volume = 0.3;
          sounds.boss = new Audio('cosmodoge-theme-jefe.wav'); sounds.boss.loop = true; sounds.boss.volume = 0.4;
          sounds.jump = new Audio('salto.mp3'); sounds.coin = new Audio('moneda.mp3'); sounds.explosion = new Audio('boom.mp3');
        } catch(e) {}
      }
      
      function unlockAudio() { if(audioUnlocked) return; audioUnlocked = true; }
      function playMusic(type) { if(!audioUnlocked) return; if(type === 'boss') { if(sounds.normal) sounds.normal.pause(); if(sounds.boss) { sounds.boss.currentTime = 0; sounds.boss.play().catch(()=>{}); } } else { if(sounds.boss) sounds.boss.pause(); if(sounds.normal) { sounds.normal.currentTime = 0; sounds.normal.play().catch(()=>{}); } } }
      function stopMusic() { if(sounds.normal) sounds.normal.pause(); if(sounds.boss) sounds.boss.pause(); }
      function playSound(s) { if(s && audioUnlocked) { s.currentTime = 0; s.play().catch(()=>{}); } }
      function toast(msg) { const d = document.createElement('div'); d.className = 'toast-msg'; d.textContent = msg; document.body.appendChild(d); setTimeout(() => d.remove(), 2000); }
      
      // ==================== VARIABLES DEL JUEGO ====================
      const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
      function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resizeCanvas); resizeCanvas();
      
      let gameActive = false, isPaused = false, animationId = null;
      let score = 0, coins = 0, highScore = 0, totalCDOGE = 0, totalBCOSMO = 0;
      let timeElapsed = 0, lastScoreTime = 0, lastObs = 0;
      let isShieldActive = false, shieldHits = 0, imanExpiration = 0;
      let comboCounter = 0, currentWave = 1;
      let particles = [], lastTimestampGameLoop = 0, cameraShake = 0;
      let hasGun = false, gunDamage = 10;
      let coinMultiplier = 1, coinMultiplierEnd = 0;
      let dogeSpeed = 5;
      
      let coinsArr = [], obsArr = [], cdogeArr = [], bcosmoArr = [], cofreEspacial = null, bullets = [];
      let boss = { active: false, x: 0, y: 0, w: 150, h: 150, health: 1000, maxHealth: 1000, attackPattern: 'followers', attackTimer: 0, moveTimer: 0, followers: [] };
      let bossProjectiles = [];
      
      const doge = { x: 100, y: 200, w: 48, h: 48, vy: 0 };
      const gravity = 0.48, JUMP_POWER = -9.2;
      let moveLeft = false, moveRight = false, moveUp = false, moveDown = false, invincibleUntil = 0;
      
      // ==================== LÓGICA DE JUEGO (MEJORADA) ====================
      function checkCollision(r1, r2, pad=5) { return r1.x < r2.x+r2.w-pad && r1.x+r1.w > r2.x+pad && r1.y < r2.y+r2.h-pad && r1.y+r1.h > r2.y+pad; }
      function handleCollision() { if(Date.now() < invincibleUntil) return true; if(isShieldActive && shieldHits > 0) { shieldHits--; if(shieldHits<=0) isShieldActive=false; updateUI(); invincibleUntil=Date.now()+500; return true; } cameraShake=10; document.body.classList.add('camera-shake'); setTimeout(()=>document.body.classList.remove('camera-shake'),300); return false; }
      
      function spawnBoss() { 
        if(boss.active || currentWave < 3) return; 
        boss.active=true; boss.x=canvas.width-200; boss.y=canvas.height/2-75; boss.maxHealth=1000+currentWave*200; boss.health=boss.maxHealth; 
        boss.followers = [{ x:boss.x-60, y:boss.y, w:40, h:40, baseY:boss.y, angle:0 }, { x:boss.x-60, y:boss.y+110, w:40, h:40, baseY:boss.y+110, angle:Math.PI }]; 
        hasGun=true; playMusic('boss'); toast('👾 ¡COSMODRAGON!'); updateBossUI(); 
      }
      
      function updateBoss() { 
        if(!boss.active || isPaused) return; 
        boss.moveTimer+=0.02; boss.y=canvas.height/2-75+Math.sin(boss.moveTimer)*120; 
        boss.attackTimer++; 
        boss.followers.forEach(f => { f.angle+=0.05; f.x=boss.x-60+Math.cos(f.angle)*80; f.y=f.baseY+Math.sin(f.angle)*80; if(checkCollision(doge,f) && !handleCollision()) gameOver(); }); 
        if(boss.attackTimer>120) { boss.attackTimer=0; for(let i=-2;i<=2;i++) bossProjectiles.push({ x:boss.x, y:boss.y+boss.h/2+i*30, w:12, h:12, speed:6 }); } 
        if(checkCollision(doge,boss) && !handleCollision()) gameOver(); 
      }
      
      function updateBossUI() { 
        const c = document.getElementById('bossHealthContainer'); if(!c) return; 
        if(boss.active) { 
          document.getElementById('bossHealthFill').style.width = `${(boss.health/boss.maxHealth)*100}%`; 
          document.getElementById('bossHealthText').innerHTML = `❤️ ${Math.floor(boss.health)}/${boss.maxHealth}`; 
          c.style.display='block'; 
        } else { c.style.display='none'; } 
      }
      
      function bossDefeated() { 
        boss.active=false; playSound(sounds.explosion); coins+=5000; totalCDOGE+=500; totalBCOSMO+=500; 
        localStorage.setItem('cdogeCoins',coins); localStorage.setItem('cdogeTotalCoins',totalCDOGE); localStorage.setItem('bcosmoTotalCoins',totalBCOSMO); 
        for(let i=0;i<30;i++) setTimeout(()=>coinsArr.push({ x:boss.x+Math.random()*150, y:boss.y+Math.random()*150, w:24, h:24, s:2 }),i*50); 
        toast('🎉 ¡JEFE DERROTADO! +5000🪙'); playMusic('normal'); updateBossUI(); updateUI(); 
      }
      
      function shoot() { if(!gameActive||isPaused||!hasGun) return; bullets.push({ x:doge.x+doge.w, y:doge.y+doge.h/2, w:12, h:6, dmg:gunDamage }); playSound(sounds.jump); }
      
      // ==================== GAME LOOP ====================
      function updateGame(dt) {
        if(!gameActive||isPaused) return;
        // Movimiento con velocidad de Skin
        if(moveLeft) doge.x=Math.max(20,doge.x-dogeSpeed); if(moveRight) doge.x=Math.min(canvas.width-68,doge.x+dogeSpeed);
        if(moveUp) doge.y=Math.max(20,doge.y-dogeSpeed); if(moveDown) doge.y=Math.min(canvas.height-68,doge.y+dogeSpeed);
        
        doge.vy+=gravity*(dt/16); doge.y+=doge.vy*(dt/16);
        if(doge.y+48>=canvas.height||doge.y<=0) { if(!handleCollision()) gameOver(); doge.y=Math.min(Math.max(doge.y,0),canvas.height-48); doge.vy=0; }
        
        timeElapsed+=dt; if(timeElapsed/1000-lastScoreTime>=2) { score+=comboCounter>=10?3:(comboCounter>=5?2:1); lastScoreTime=timeElapsed/1000; }
        if(!boss.active && score>=500) spawnBoss();
        currentWave=Math.floor(score/300)+1;
        
        // Spawns
        if(!boss.active) {
          if(coinsArr.length<20 && Math.random()<0.03) { for(let i=0;i<3;i++) coinsArr.push({ x:canvas.width+i*45, y:40+Math.random()*(canvas.height-100), w:24, h:24, s:2 }); }
          if(cdogeArr.length<6 && Math.random()<0.01) cdogeArr.push({ x:canvas.width, y:40+Math.random()*(canvas.height-100), w:28, h:28 });
          if(bcosmoArr.length<6 && Math.random()<0.01) bcosmoArr.push({ x:canvas.width, y:40+Math.random()*(canvas.height-100), w:28, h:28 });
          if(obsArr.length<10 && Date.now()-lastObs>Math.max(600,1500-currentWave*50)) { obsArr.push({ x:canvas.width, y:50+Math.random()*(canvas.height-120), w:48, h:48, sX:2+currentWave*0.1 }); lastObs=Date.now(); if(comboCounter<20) comboCounter++; }
          if(!cofreEspacial && timeElapsed/1000>45 && Math.random()<0.002) cofreEspacial = { x:canvas.width, y:Math.random()*(canvas.height-100), w:48, h:48, vel:1.5, recogido:false };
        }
        
        // Colisiones y Lógica
        obsArr.forEach((o,i)=>{ o.x-=o.sX; if(checkCollision(doge,o,5) && !handleCollision()) gameOver(); }); obsArr=obsArr.filter(o=>o.x+o.w>0);
        bullets.forEach((b,i)=>{ b.x+=10; if(boss.active && checkCollision(b,boss,0)) { boss.health-=b.dmg; bullets.splice(i,1); if(boss.health<=0) bossDefeated(); } if(b.x>canvas.width) bullets.splice(i,1); });
        
        updateBoss(); updateBossProjectiles(); 
        if(Date.now()>coinMultiplierEnd) coinMultiplier=1;
        updateUI();
      }
      
      function updateBossProjectiles() { for(let i=0;i<bossProjectiles.length;i++) { let p=bossProjectiles[i]; p.x-=p.speed; if(p.x<0||p.y<0||p.y>canvas.height) { bossProjectiles.splice(i,1); i--; continue; } if(checkCollision(doge,p) && !handleCollision()) gameOver(); } }
      
      function gameOver() { if(!gameActive) return; stopMusic(); gameActive=false; document.getElementById('finalScoreValue').textContent=score; document.getElementById('finalCoinsValue').textContent=coins; document.getElementById('finalCDOGEValue').textContent=totalCDOGE; document.getElementById('finalBCOSMOValue').textContent=totalBCOSMO; if(score>highScore) { highScore=score; localStorage.setItem('cdogeFloatHighScore',highScore); document.getElementById('recordScore').innerHTML=`🚀 ${score} pts`; document.getElementById('newRecordScreen').classList.remove('hidden'); return; } document.getElementById('gameOverScreen').classList.remove('hidden'); document.getElementById('shootBtn').style.display='none'; document.getElementById('menuFloatBtn').style.display='none'; }
      
      function updateUI() {
        document.getElementById('scoreDisplay').innerHTML = `🚀 ${Math.floor(score)}`; document.getElementById('coinDisplay').innerHTML = `💰 ${Math.floor(coins)}`;
        document.getElementById('highScoreDisplay').innerHTML = `🏆 ${highScore}`; document.getElementById('contadorCDOGE').innerHTML = `💎 ${Math.floor(totalCDOGE)}`; document.getElementById('contadorBCOSMO').innerHTML = `🐕 ${Math.floor(totalBCOSMO)}`;
        document.getElementById('shieldDisplay').style.display = (isShieldActive && shieldHits>0) ? 'flex' : 'none'; if(isShieldActive) document.getElementById('shieldDisplay').innerHTML = `🛡️ ${shieldHits}`;
        document.getElementById('imanContador').style.display = (Date.now() < imanExpiration) ? 'flex' : 'none'; if(Date.now() < imanExpiration) document.getElementById('imanContador').innerHTML = `🧲 ${Math.ceil((imanExpiration-Date.now())/60000)}min`;
        document.getElementById('comboDisplay').style.display = comboCounter>1 ? 'flex' : 'none'; if(comboCounter>1) document.getElementById('comboDisplay').innerHTML = `🔥 x${comboCounter}`;
        document.getElementById('multiplierDisplay').style.display = (Date.now() < coinMultiplierEnd) ? 'flex' : 'none'; if(Date.now() < coinMultiplierEnd) document.getElementById('multiplierDisplay').innerHTML = `✨ x${coinMultiplier}`;
        document.getElementById('waveDisplay').innerHTML = `🌊 ${currentWave}`;
      }
      
      function resetGame() { 
        score=0; comboCounter=0; timeElapsed=0; currentWave=1; coins=parseInt(localStorage.getItem('cdogeCoins'))||0; totalCDOGE=parseInt(localStorage.getItem('cdogeTotalCoins'))||0; totalBCOSMO=parseInt(localStorage.getItem('bcosmoTotalCoins'))||0; highScore=parseInt(localStorage.getItem('cdogeFloatHighScore'))||0;
        shieldHits=parseInt(localStorage.getItem('shieldHitsPersistent'))||0; isShieldActive=shieldHits>0; hasGun=localStorage.getItem('hasGun')==='true'; dogeSpeed=5; coinMultiplier=1;
        doge.x=100; doge.y=canvas.height/2-24; doge.vy=0; coinsArr=[]; obsArr=[]; cdogeArr=[]; bcosmoArr=[]; cofreEspacial=null; bossProjectiles=[]; bullets=[]; boss.active=false; boss.followers=[]; isPaused=false; updateBossUI(); updateUI(); 
      }
      
      // ==================== RENDERIZADO ====================
      function draw() {
        ctx.fillStyle = '#0a0a2a'; ctx.fillRect(0,0,canvas.width,canvas.height);
        // Coins
        coinsArr.forEach((c,i)=>{ c.x-=c.s; ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(c.x+12,c.y+12,12,0,Math.PI*2); ctx.fill(); if(checkCollision(doge,c,0)) { coins+=(Date.now()<coinMultiplierEnd?coinMultiplier:1); localStorage.setItem('cdogeCoins',coins); playSound(sounds.coin); coinsArr.splice(i,1); updateUI(); } }); coinsArr=coinsArr.filter(c=>c.x+c.w>0);
        cdogeArr.forEach((m,i)=>{ m.x-=3.5; ctx.fillStyle='#00FFFF'; ctx.beginPath(); ctx.arc(m.x+14,m.y+14,14,0,Math.PI*2); ctx.fill(); if(checkCollision(doge,m,0)) { totalCDOGE+=50; localStorage.setItem('cdogeTotalCoins',totalCDOGE); cdogeArr.splice(i,1); toast('+50 CDOGE'); updateUI(); } }); cdogeArr=cdogeArr.filter(m=>m.x+m.w>0);
        bcosmoArr.forEach((m,i)=>{ m.x-=3.5; ctx.fillStyle='#FFA500'; ctx.beginPath(); ctx.arc(m.x+14,m.y+14,14,0,Math.PI*2); ctx.fill(); if(checkCollision(doge,m,0)) { totalBCOSMO+=50; localStorage.setItem('bcosmoTotalCoins',totalBCOSMO); bcosmoArr.splice(i,1); toast('+50 BCOSMO'); updateUI(); } }); bcosmoArr=bcosmoArr.filter(m=>m.x+m.w>0);
        obsArr.forEach(o=>{ ctx.fillStyle='#ff3366'; ctx.fillRect(o.x,o.y,o.w,o.h); });
        if(cofreEspacial) { cofreEspacial.x-=cofreEspacial.vel; ctx.fillStyle='#ffaa44'; ctx.fillRect(cofreEspacial.x,cofreEspacial.y,cofreEspacial.w,cofreEspacial.h); if(!cofreEspacial.recogido && checkCollision(doge,cofreEspacial,0)) { cofreEspacial.recogido=true; const p=Math.random(); if(p<0.33) { isShieldActive=true; shieldHits=3; } else if(p<0.66) { imanExpiration=Date.now()+300000; } else { coinMultiplier=2; coinMultiplierEnd=Date.now()+60000; } setTimeout(()=>cofreEspacial=null,100); updateUI(); } if(cofreEspacial.x+48<0) cofreEspacial=null; }
        if(boss.active) { ctx.fillStyle='#f0f'; ctx.shadowColor='#f0f'; ctx.shadowBlur=30; ctx.fillRect(boss.x,boss.y,boss.w,boss.h); ctx.shadowBlur=0; boss.followers?.forEach(f=>{ ctx.fillStyle='#f60'; ctx.fillRect(f.x,f.y,f.w,f.h); }); bossProjectiles.forEach(p=>{ ctx.fillStyle='#f00'; ctx.fillRect(p.x,p.y,p.w,p.h); }); }
        ctx.fillStyle='#0ff'; ctx.fillRect(doge.x,doge.y,doge.w,doge.h);
        if(isShieldActive) { ctx.beginPath(); ctx.arc(doge.x+24,doge.y+24,30,0,Math.PI*2); ctx.strokeStyle='#48f'; ctx.lineWidth=3; ctx.stroke(); }
        bullets.forEach(b=>{ ctx.fillStyle='#ff0'; ctx.fillRect(b.x,b.y,b.w,b.h); });
      }
      
      function gameLoop(ts) { try { if(lastTimestampGameLoop===0) lastTimestampGameLoop=ts; const dt=Math.min(33,ts-lastTimestampGameLoop); if(gameActive) updateGame(dt); draw(); lastTimestampGameLoop=ts; animationId=requestAnimationFrame(gameLoop); } catch(e) { console.error(e); animationId=requestAnimationFrame(gameLoop); } }
      
      // ==================== CONTROLES ====================
      function startGame() { resetGame(); gameActive=true; isPaused=false; document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden')); document.getElementById('shootBtn').style.display='flex'; document.getElementById('menuFloatBtn').style.display='flex'; playMusic('normal'); }
      function stopGame() { gameActive=false; stopMusic(); document.getElementById('shootBtn').style.display='none'; document.getElementById('menuFloatBtn').style.display='none'; }
      function togglePause() { if(!gameActive) return; isPaused=!isPaused; toast(isPaused?'⏸️ Pausa':'▶️ Continuar'); }
      
      // ==================== INICIALIZACIÓN ====================
      async function initGame() {
        await preloadAssets(); initSounds();
        document.body.addEventListener('touchstart', unlockAudio, { once: true });
        document.body.addEventListener('click', unlockAudio, { once: true });
        
        // Listeners Básicos
        document.getElementById('playBtn').onclick = startGame;
        document.getElementById('shopBtn').onclick = () => document.getElementById('shopPanel').style.display='block';
        document.getElementById('closeShopBtn').onclick = () => document.getElementById('shopPanel').style.display='none';
        document.getElementById('menuFloatBtn').onclick = () => { stopGame(); document.getElementById('mainMenu').classList.remove('hidden'); };
        document.getElementById('restartBtn').onclick = startGame;
        document.getElementById('menuFromGameOver').onclick = () => { document.getElementById('gameOverScreen').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); };
        document.getElementById('shootBtn').onclick = shoot;
        document.getElementById('pauseBtn').onclick = togglePause;
        document.getElementById('continueAfterRecord').onclick = () => { document.getElementById('newRecordScreen').classList.add('hidden'); startGame(); };
        document.getElementById('menuAfterRecord').onclick = () => { document.getElementById('newRecordScreen').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); };
        
        // Tienda
        document.getElementById('buyMagnet').onclick = () => { if(coins>=1000) { coins-=1000; imanExpiration=Date.now()+3600000; localStorage.setItem('cdogeCoins',coins); updateUI(); toast('🧲 Imán 1h'); } else toast('💰 1000 monedas'); };
        document.getElementById('buyShield').onclick = () => { if(coins>=1500) { coins-=1500; isShieldActive=true; shieldHits=3; localStorage.setItem('cdogeCoins',coins); localStorage.setItem('shieldHitsPersistent',shieldHits); updateUI(); toast('🛡️ Escudo +3'); } else toast('💰 1500 monedas'); };
        document.getElementById('buyGun').onclick = () => { if(coins>=2000) { coins-=2000; hasGun=true; localStorage.setItem('cdogeCoins',coins); localStorage.setItem('hasGun','true'); updateUI(); toast('🔫 Pistola comprada'); } else toast('💰 2000 monedas'); };
        
        // Controles
        document.addEventListener('keydown', e => { if(e.code==='ArrowLeft') moveLeft=true; if(e.code==='ArrowRight') moveRight=true; if(e.code==='ArrowUp') moveUp=true; if(e.code==='ArrowDown') moveDown=true; if(e.code==='Space') { e.preventDefault(); doge.vy=JUMP_POWER; playSound(sounds.jump); } if(e.code==='Escape') togglePause(); });
        document.addEventListener('keyup', e => { if(e.code==='ArrowLeft') moveLeft=false; if(e.code==='ArrowRight') moveRight=false; if(e.code==='ArrowUp') moveUp=false; if(e.code==='ArrowDown') moveDown=false; });
        canvas.addEventListener('touchstart', e => { if(gameActive && !isPaused) { e.preventDefault(); doge.vy=JUMP_POWER; playSound(sounds.jump); } });
        
        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
        animationId = requestAnimationFrame(gameLoop);
      }
      
      initGame();
    })();
  </script>
</body>
</html>
